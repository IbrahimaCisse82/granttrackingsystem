      font-src 'self' data: https://fonts.gstatic.com;
      img-src 'self' data: blob: https:;

      frame-ancestors 'self' https://*.lovable.app https://*.lovable.dev;
      base-uri 'self';
      form-action 'self';
      object-src 'none';
      upgrade-insecure-requests;
    " />
